services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: db-catalog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d db-catalog"]
      interval: 5s
      timeout: 5s
      retries: 20

  catalog-service:
    build:
      context: ./catalog-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/db-catalog
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8081"

  lending-service:
    build:
      context: ./lending-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/db-lending
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      CATALOG_BASE_URL: http://catalog-service:8081
    depends_on:
      postgres:
        condition: service_healthy
      catalog-service:
        condition: service_started
    ports:
      - "8082:8082"

volumes:
  pg_data:
