services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mandiri
      POSTGRES_USER: mandiri
      POSTGRES_PASSWORD: mandiri
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d

  catalog-service:
    build:
      context: ./catalog-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mandiri
      SPRING_DATASOURCE_USERNAME: mandiri
      SPRING_DATASOURCE_PASSWORD: mandiri
    depends_on:
      - postgres
    ports:
      - "8081:8081"

  lending-service:
    build:
      context: ./lending-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mandiri
      SPRING_DATASOURCE_USERNAME: mandiri
      SPRING_DATASOURCE_PASSWORD: mandiri
      CATALOG_BASE_URL: http://catalog-service:8081
    depends_on:
      - postgres
      - catalog-service
    ports:
      - "8082:8082"

volumes:
  pg_data:
